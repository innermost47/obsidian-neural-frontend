<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="js/config.js"></script>
    <script>
      (function () {
        var cfg = window.APP_CONFIG || {};
        var siteName = cfg.SITE_NAME || "OBSIDIAN Neural";
        var siteUrl = cfg.SITE_URL || "";
        document.title = "Login - " + siteName + " | Access Your Dashboard";
        var desc = document.createElement("meta");
        desc.name = "description";
        desc.content =
          "Log in to your " +
          siteName +
          " account to access your API key and manage your audio generation credits.";
        document.head.appendChild(desc);
        var robots = document.createElement("meta");
        robots.name = "robots";
        robots.content = "noindex, nofollow";
        document.head.appendChild(robots);
        if (siteUrl) {
          var canonical = document.createElement("link");
          canonical.rel = "canonical";
          canonical.href = siteUrl + "/login.html";
          document.head.appendChild(canonical);
        }
      })();
    </script>

    <link rel="icon" type="image/x-icon" href="assets/images/logo.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
          <div class="auth-card">
            <div class="auth-icon mb-4">
              <i class="fas fa-sign-in-alt fa-3x"></i>
            </div>

            <h1 class="h2 text-center fw-bold mb-2">Welcome Back</h1>
            <p class="text-center mb-4">Sign in to access your dashboard</p>

            <div
              id="error-alert"
              class="alert-custom alert-danger d-none mb-4"
              role="alert"
            >
              <i class="fas fa-exclamation-circle me-2"></i>
              <span id="error-message"></span>
            </div>

            <div id="2fa-container" class="d-none">
              <div class="text-center mb-4">
                <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
                <h2 class="h4 fw-bold">Two-Factor Authentication</h2>
                <p class="text-muted">
                  Enter the 6-digit code from your authenticator app
                </p>
              </div>

              <form id="2fa-form">
                <div class="mb-4">
                  <input
                    type="text"
                    class="form-control-modern text-center"
                    id="2fa-code"
                    placeholder="000000"
                    maxlength="6"
                    pattern="[0-9]{6}"
                    required
                    autocomplete="off"
                  />
                </div>

                <button
                  type="submit"
                  class="btn btn-gradient-primary w-100 py-3 fw-bold"
                  id="2fa-submit-btn"
                >
                  <i class="fas fa-check me-2"></i>
                  <span id="2fa-submit-text">Verify</span>
                </button>

                <button
                  type="button"
                  class="btn btn-link text-success w-100 mt-3"
                  onclick="backToLogin()"
                >
                  <i class="fas fa-arrow-left me-2"></i>Back to login
                </button>
              </form>
            </div>

            <form id="login-form">
              <div class="mb-4">
                <label for="email" class="form-label fw-semibold">
                  <i class="fas fa-envelope me-2 text-secondary"></i>Email
                  Address
                </label>
                <input
                  type="email"
                  class="form-control-modern"
                  id="email"
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                />
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                  <i class="fas fa-lock me-2 text-secondary"></i>Password
                </label>
                <div class="password-input-wrapper">
                  <input
                    type="password"
                    class="form-control-modern"
                    id="password"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword()"
                  >
                    <i class="fas fa-eye" id="password-icon"></i>
                  </button>
                </div>
                <div class="text-end mt-2">
                  <a href="forgot-password.html" class="text-secondary small">
                    <i class="fas fa-question-circle me-1"></i>Forgot password?
                  </a>
                </div>
              </div>

              <button
                type="submit"
                class="btn btn-gradient-primary w-100 py-3 fw-bold mb-3"
                id="submit-btn"
              >
                <i class="fas fa-sign-in-alt me-2"></i>
                <span id="submit-text">Log In</span>
              </button>

              <button
                type="button"
                class="btn btn-outline-secondary w-100 py-3 fw-bold"
                id="google-login-btn"
                onclick="loginWithGoogle()"
              >
                <img
                  src="assets/images/google-logo.png"
                  alt="google logo"
                  class="google-logo"
                />
                <span>Continue with Google</span>
              </button>
            </form>

            <div class="divider my-4">
              <span>OR</span>
            </div>

            <div class="text-center">
              <p class="mb-3">Don't have an account?</p>
              <a
                href="register.html"
                class="btn btn-outline-primary w-100 py-3 fw-bold"
              >
                <i class="fas fa-user-plus me-2"></i>Create Account
              </a>
            </div>
          </div>

          <div class="row g-3 mt-4">
            <div class="col-6">
              <div class="feature-badge">
                <i class="fas fa-bolt text-warning me-2"></i>
                <span class="small">Instant Access</span>
              </div>
            </div>
            <div class="col-6">
              <div class="feature-badge">
                <i class="fas fa-shield-alt text-success me-2"></i>
                <span class="small">Secure Login</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/cookie-consent.js"></script>
    <script src="js/components.js"></script>
  </body>
</html>
