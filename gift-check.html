<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Gift Code - Obsidian Neural</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <!-- Header -->
          <div class="text-center mb-5">
            <div
              class="icon-circle bg-gradient-blue mx-auto mb-4"
              style="width: 80px; height: 80px"
            >
              <i class="fas fa-search fa-2x"></i>
            </div>
            <h1 class="display-5 fw-bold mb-3">Check Gift Code</h1>
            <p class="lead text-muted">
              Enter your gift code to see the details
            </p>
          </div>

          <!-- Check Form -->
          <div class="auth-card" id="checkForm">
            <form id="giftCheckForm">
              <div class="mb-4">
                <label for="giftCode" class="form-label fw-bold">
                  <i class="fas fa-gift me-2"></i>Gift Code
                </label>
                <input
                  type="text"
                  class="form-control form-control-modern"
                  id="giftCode"
                  placeholder="OBSIDIAN-XXXXXXXXXXXX"
                  required
                  style="text-transform: uppercase"
                />
                <small class="text-muted">
                  Format: OBSIDIAN-XXXXXXXXXXXX
                </small>
              </div>

              <div
                class="alert alert-danger d-none"
                id="errorAlert"
                role="alert"
              ></div>

              <button
                type="submit"
                class="btn btn-gradient-primary w-100 py-3 fw-bold"
                id="submitBtn"
              >
                <i class="fas fa-search me-2"></i>Check Gift Code
              </button>
            </form>
          </div>

          <!-- Loading State -->
          <div class="auth-card text-center d-none" id="loadingState">
            <div class="spinner-border text-primary mb-3" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted">Checking your gift code...</p>
          </div>

          <!-- Gift Details -->
          <div class="d-none" id="giftDetailsCard">
            <div class="auth-card">
              <div class="text-center mb-4">
                <div
                  class="icon-circle bg-gradient-green mx-auto mb-3"
                  style="width: 80px; height: 80px"
                >
                  <i class="fas fa-check fa-2x"></i>
                </div>
                <h3 class="h4 fw-bold mb-2">Valid Gift Code!</h3>
                <p class="text-muted mb-0">Here's what you'll receive:</p>
              </div>

              <div class="row g-3 mb-4">
                <div class="col-6">
                  <div class="p-3 bg-light rounded text-center">
                    <i class="fas fa-crown fa-2x text-primary mb-2"></i>
                    <h6 class="fw-bold mb-0 small">Plan</h6>
                    <p class="mb-0" id="giftPlan">-</p>
                  </div>
                </div>
                <div class="col-6">
                  <div class="p-3 bg-light rounded text-center">
                    <i class="fas fa-calendar fa-2x text-primary mb-2"></i>
                    <h6 class="fw-bold mb-0 small">Duration</h6>
                    <p class="mb-0" id="giftDuration">-</p>
                  </div>
                </div>
              </div>

              <div
                class="info-card mb-4"
                id="giftMessageBox"
                style="display: none"
              >
                <div class="d-flex align-items-start">
                  <i
                    class="fas fa-comment-dots fa-2x text-primary me-3 mt-1"
                  ></i>
                  <div>
                    <h6 class="fw-bold mb-2">
                      Personal Message from
                      <span id="purchaserName">someone special</span>:
                    </h6>
                    <p class="mb-0 fst-italic" id="giftMessageContent">-</p>
                  </div>
                </div>
              </div>

              <div class="alert alert-info mb-4">
                <i class="fas fa-envelope me-2"></i>
                This gift is for: <strong id="recipientEmail">-</strong>
              </div>
              <a
                href="gift-activate.html"
                class="btn btn-gradient-primary w-100 py-3 fw-bold"
                id="activateBtn"
              >
                <i class="fas fa-unlock me-2"></i>Activate This Gift
              </a>

              <button
                class="btn btn-outline-secondary w-100 mt-3"
                onclick="window.location.reload()"
              >
                <i class="fas fa-search me-2"></i>Check Another Code
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/cookie-consent.js"></script>
    <script src="js/gift-check.js"></script>
  </body>
</html>
