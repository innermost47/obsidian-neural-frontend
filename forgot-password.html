<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="js/config.js"></script>
    <script>
      (function () {
        var cfg = window.APP_CONFIG || {};
        var siteName = cfg.SITE_NAME || "OBSIDIAN Neural";
        document.title = "Forgot Password - " + siteName;
        var meta = document.createElement("meta");
        meta.name = "description";
        meta.content =
          "Reset your " +
          siteName +
          " password. We'll send you a secure link to create a new password.";
        document.head.appendChild(meta);
        var robots = document.createElement("meta");
        robots.name = "robots";
        robots.content = "noindex, nofollow";
        document.head.appendChild(robots);
      })();
    </script>

    <link rel="icon" type="image/x-icon" href="assets/images/logo.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
          <div class="auth-card">
            <div class="auth-icon mb-4">
              <i class="fas fa-key fa-3x"></i>
            </div>

            <h1 class="h2 text-center fw-bold mb-2">Forgot Password?</h1>
            <p class="text-center mb-4">
              No worries! Enter your email and we'll send you a reset link.
            </p>

            <div
              id="success-alert"
              class="alert-custom alert-success d-none mb-4"
              role="alert"
            >
              <i class="fas fa-check-circle me-2"></i>
              <span id="success-message"></span>
            </div>

            <div
              id="error-alert"
              class="alert-custom alert-danger d-none mb-4"
              role="alert"
            >
              <i class="fas fa-exclamation-circle me-2"></i>
              <span id="error-message"></span>
            </div>

            <form id="forgot-password-form">
              <div class="mb-4">
                <label for="email" class="form-label fw-semibold">
                  <i class="fas fa-envelope me-2 text-secondary"></i>Email
                  Address
                </label>
                <input
                  type="email"
                  class="form-control-modern"
                  id="email"
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                />
                <small class="text-muted mt-2 d-block">
                  <i class="fas fa-info-circle me-1"></i>We'll send a reset link
                  to this email
                </small>
              </div>

              <button
                type="submit"
                class="btn btn-gradient-primary w-100 py-3 fw-bold mb-3"
                id="submit-btn"
              >
                <i class="fas fa-paper-plane me-2"></i>
                <span id="submit-text">Send Reset Link</span>
              </button>
            </form>

            <div class="divider my-4">
              <span>OR</span>
            </div>

            <div class="text-center">
              <p class="mb-3">Remember your password?</p>
              <a
                href="login.html"
                class="btn btn-outline-primary w-100 py-3 fw-bold"
              >
                <i class="fas fa-arrow-left me-2"></i>Back to Login
              </a>
            </div>
          </div>

          <div class="benefits-card mt-4">
            <h3 class="h6 fw-bold mb-3 text-center">
              <i class="fas fa-shield-alt text-success me-2"></i>Security Tips
            </h3>
            <ul class="benefits-list">
              <li>
                <i class="fas fa-check text-success me-2"></i>
                <span>Reset link expires in 1 hour</span>
              </li>
              <li>
                <i class="fas fa-check text-success me-2"></i>
                <span>Check your spam folder if needed</span>
              </li>
              <li>
                <i class="fas fa-check text-success me-2"></i>
                <span>Link can only be used once</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
      const form = document.getElementById("forgot-password-form");
      const errorAlert = document.getElementById("error-alert");
      const errorMessage = document.getElementById("error-message");
      const successAlert = document.getElementById("success-alert");
      const successMessage = document.getElementById("success-message");
      const submitBtn = document.getElementById("submit-btn");
      const submitText = document.getElementById("submit-text");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        submitBtn.disabled = true;
        submitText.innerHTML =
          '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
        errorAlert.classList.add("d-none");
        successAlert.classList.add("d-none");

        try {
          await API.forgotPassword(email);

          successMessage.textContent =
            "If an account exists with this email, you'll receive a reset link shortly. Check your inbox!";
          successAlert.classList.remove("d-none");

          submitText.innerHTML = '<i class="fas fa-check me-2"></i>Email Sent!';
          submitBtn.classList.remove("btn-gradient-primary");
          submitBtn.classList.add("btn-success");

          document.getElementById("email").value = "";

          setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.classList.remove("btn-success");
            submitBtn.classList.add("btn-gradient-primary");
            submitText.innerHTML =
              '<i class="fas fa-paper-plane me-2"></i>Send Reset Link';
          }, 3000);
        } catch (error) {
          errorMessage.textContent =
            error.detail || "Failed to send reset email. Please try again.";
          errorAlert.classList.remove("d-none");
          submitBtn.disabled = false;
          submitText.innerHTML =
            '<i class="fas fa-paper-plane me-2"></i>Send Reset Link';

          errorAlert.classList.add("shake");
          setTimeout(() => errorAlert.classList.remove("shake"), 500);
        }
      });
    </script>
    <script src="js/cookie-consent.js"></script>
    <script src="js/components.js"></script>
  </body>
</html>
