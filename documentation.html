<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="js/config.js"></script>
    <script>
      (function () {
        var cfg = window.APP_CONFIG || {};
        var siteName = cfg.SITE_NAME || "OBSIDIAN Neural";
        var siteUrl = cfg.SITE_URL || "";
        var pluginName = cfg.PLUGIN_NAME || siteName;
        var pluginFormats = cfg.PLUGIN_FORMATS || "VST3/AU";
        var authorName = cfg.PUBLICATION_DIRECTOR || cfg.COMPANY_NAME || "";
        var authorAlias = cfg.AUTHOR_ALIAS || "";
        var githubUrl = cfg.GITHUB_URL || "";
        var twitterHandle = cfg.TWITTER_HANDLE || "";
        var screenshotUrl = siteUrl
          ? siteUrl + "/assets/images/screenshot.png"
          : "";
        var pageUrl = siteUrl + "/documentation.html";
        var pageTitle =
          "Documentation — " +
          pluginName +
          " | " +
          pluginFormats +
          " Plugin Setup, Draw-to-Audio, Bank Management";
        var pageDesc =
          "Complete " +
          pluginName +
          " documentation: install " +
          pluginFormats +
          " plugin on Windows & macOS, configure Bitwig Studio & Ableton Live multi-output, manage your sample Bank, use Draw-to-Audio AI generation. Step-by-step guides with videos.";
        var keywords =
          pluginName +
          " documentation, AI VST plugin setup, VST3 install Windows macOS, Bitwig Studio multi-output, Ableton Live AI plugin, draw to audio tutorial, AI sample bank management, " +
          pluginName +
          " guide";
        if (authorAlias) keywords += ", " + authorAlias + " documentation";

        document.title = pageTitle;

        function setMeta(name, content, prop) {
          if (!content) return;
          var el = document.createElement("meta");
          el.setAttribute(prop ? "property" : "name", name);
          el.setAttribute("content", content);
          document.head.appendChild(el);
        }
        function setLink(rel, href) {
          if (!href) return;
          var el = document.createElement("link");
          el.setAttribute("rel", rel);
          el.setAttribute("href", href);
          document.head.appendChild(el);
        }

        setMeta("description", pageDesc);
        setMeta("keywords", keywords);
        setMeta(
          "author",
          authorAlias
            ? authorAlias + (authorName ? " - " + authorName : "")
            : authorName,
        );
        setMeta("robots", "index, follow");
        setLink("canonical", pageUrl);

        // Open Graph
        setMeta("og:type", "website", true);
        setMeta("og:site_name", siteName, true);
        setMeta("og:locale", "en_US", true);
        setMeta("og:url", pageUrl, true);
        setMeta(
          "og:title",
          "Documentation — " + pluginName + " AI Music VST Plugin",
          true,
        );
        setMeta(
          "og:description",
          "Step-by-step guides: install on Windows & macOS, Bitwig & Ableton multi-output routing, AI sample Bank management, Draw-to-Audio visual generation.",
          true,
        );
        setMeta("og:image", screenshotUrl, true);
        setMeta("og:image:width", "1200", true);
        setMeta("og:image:height", "630", true);
        setMeta("og:image:alt", pluginName + " VST plugin documentation", true);

        // Twitter / X
        setMeta("twitter:card", "summary_large_image");
        if (twitterHandle) setMeta("twitter:site", "@" + twitterHandle);
        setMeta("twitter:url", pageUrl);
        setMeta(
          "twitter:title",
          "Documentation — " + pluginName + " AI Music VST",
        );
        setMeta(
          "twitter:description",
          "Complete guides: VST install, DAW setup, Draw-to-Audio, Bank management. Windows, macOS, Bitwig, Ableton.",
        );
        setMeta("twitter:image", screenshotUrl);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/images/logo.ico" />

    <!-- CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/doc.css" />

    <!-- Schema.org JSON-LD — injected dynamically -->
    <script id="json-ld-placeholder" type="application/ld+json">
      []
    </script>
    <script>
      (function () {
        var cfg = window.APP_CONFIG || {};
        var siteName = cfg.SITE_NAME || "OBSIDIAN Neural";
        var siteUrl = cfg.SITE_URL || "";
        var pluginName = cfg.PLUGIN_NAME || siteName;
        var authorName = cfg.PUBLICATION_DIRECTOR || cfg.COMPANY_NAME || "";
        var authorAlias = cfg.AUTHOR_ALIAS || "";
        var githubUrl = cfg.GITHUB_URL || "";
        var pageUrl = siteUrl + "/documentation.html";

        // Helper to build doc page URL
        function docPage(slug) {
          return pageUrl + "?page=" + slug;
        }

        var jsonLd = [
          {
            "@context": "https://schema.org",
            "@type": "TechArticle",
            name: pluginName + " — Complete Documentation",
            url: pageUrl,
            description:
              "Complete documentation for " +
              pluginName +
              " AI music generation VST plugin, covering installation, DAW configuration, sample bank management, and draw-to-audio generation.",
            author: {
              "@type": "Person",
              name: authorName,
              alternateName: authorAlias || undefined,
              url: githubUrl ? githubUrl.replace(/\/[^/]+$/, "") : undefined,
            },
            publisher: {
              "@type": "Organization",
              name: siteName,
              url: siteUrl,
            },
            isPartOf: {
              "@type": "WebSite",
              name: siteName,
              url: siteUrl,
            },
            breadcrumb: {
              "@type": "BreadcrumbList",
              itemListElement: [
                {
                  "@type": "ListItem",
                  position: 1,
                  name: "Home",
                  item: siteUrl + "/",
                },
                {
                  "@type": "ListItem",
                  position: 2,
                  name: "Documentation",
                  item: pageUrl,
                },
              ],
            },
            hasPart: [
              {
                "@type": "TechArticle",
                name: "Getting Started with " + pluginName,
                url: docPage("getting-started"),
                description:
                  "Complete guide to create your account, verify email, explore the dashboard, download and install the VST3/AU plugin on Windows and macOS, and configure API credentials in your DAW.",
                timeRequired: "PT15M",
                about: [
                  "Account creation and email verification",
                  "Dashboard overview and API credentials",
                  "VST3 plugin download from GitHub",
                  "Windows installation",
                  "macOS installation via Terminal",
                  "Apple Silicon and Intel universal binary support",
                  "macOS code signing and notarization",
                  "DAW configuration and API key setup",
                ],
              },
              {
                "@type": "TechArticle",
                name: "First Steps in Your DAW",
                url: docPage("first-step"),
                description:
                  "Learn to load " +
                  pluginName +
                  " in your DAW, configure multi-output routing in Bitwig Studio and Ableton Live, explore track controls, manage prompts, generate samples, and use the step sequencer and mixer.",
                timeRequired: "PT10M",
                about: [
                  "Load VST plugin on instrument track",
                  "Bitwig Studio multi-output chain activation",
                  "Ableton Live multi-output routing step by step",
                  "8-track stereo output routing",
                  "Track controls: waveform, sequencer, pages A/B/C/D",
                  "Prompt management",
                  "Sample generation workflow",
                  "Step sequencer and MIDI-learnable mixer controls",
                  "Pitch, Finetune, Volume, Pan per track",
                ],
              },
              {
                "@type": "TechArticle",
                name: "Bank Management",
                url: docPage("bank-management"),
                description:
                  "Learn to manage, organize, preview, and drag AI-generated samples from the Bank in " +
                  pluginName +
                  ". Covers categories, filtering, search, cleanup, and drag-and-drop to DAW.",
                timeRequired: "PT15M",
                about: [
                  "Opening the sample Bank",
                  "Creating and managing sample categories",
                  "Filtering and searching samples",
                  "Cleaning unused samples to free disk space",
                  "Drag and drop samples to plugin tracks",
                  "Ctrl+Click to drag samples directly to DAW",
                  "Previewing samples before use",
                ],
              },
              {
                "@type": "TechArticle",
                name: "Draw-to-Audio Generation",
                url: docPage("draw-to-audio"),
                description:
                  "Express musical ideas visually with the experimental Draw-to-Audio feature. Sketch patterns on a 512x512 canvas — colors, tools, and shapes are interpreted by a Vision LLM and converted into AI-generated audio samples.",
                about: [
                  "512x512 drawing canvas with 4 brush types: Pencil, Brush, Spray, Eraser",
                  "10 color presets with sonic associations",
                  "Visual-to-sonic pattern mapping",
                  "Spatial composition: top=high frequencies, bottom=bass",
                  "Vision Language Model (VLM) audio pipeline",
                  "Per-track and per-page drawing state preservation",
                  "Keywords system with 20+ musical terms",
                  "1 credit per generation",
                ],
              },
            ],
          },
          {
            "@context": "https://schema.org",
            "@type": "FAQPage",
            mainEntity: [
              {
                "@type": "Question",
                name:
                  "How do I install " + pluginName + " VST plugin on Windows?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text: "Download the Windows VST3 archive from the GitHub releases page. Extract it and copy the .vst3 file to C:\\Program Files\\Common Files\\VST3. Administrator privileges may be required. Then rescan plugins in your DAW.",
                },
              },
              {
                "@type": "Question",
                name:
                  "How do I install " + pluginName + " VST plugin on macOS?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text:
                    "Download the macOS VST3 archive and extract it. Open Terminal and run: sudo cp -r ~/Downloads/" +
                    pluginName.replace(/ /g, "-") +
                    ".vst3 /Library/Audio/Plug-Ins/VST3/ — enter your password when prompted. The plugin is a universal binary supporting both Intel and Apple Silicon Macs (macOS 10.15+). It is code-signed and notarized by Apple.",
                },
              },
              {
                "@type": "Question",
                name:
                  "How do I set up multi-output routing for " +
                  pluginName +
                  " in Ableton Live?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text:
                    "In Ableton Live, load " +
                    pluginName +
                    " on a MIDI track. For each output you want, create an Audio track, set 'Audio From' to the " +
                    pluginName +
                    " MIDI track, select the specific output from the Input Channel dropdown, and set Monitor to 'In'. Repeat for each of the 8 tracks. Finally mute the main MIDI track.",
                },
              },
              {
                "@type": "Question",
                name: "How does Draw-to-Audio work in " + pluginName + "?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text: "Click the Draw button on any track to open a 512x512 canvas. Use 4 tools and 10 colors with sonic associations. Draw patterns and click Generate: your drawing is sent as Base64 PNG to a Vision Language Model which outputs a musical description, then Stable Audio generates a 30-second sample. Costs 1 credit.",
                },
              },
              {
                "@type": "Question",
                name: "How do I set up multi-output routing in Bitwig Studio?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text:
                    "In Bitwig Studio, load " +
                    pluginName +
                    " on an instrument track. Click the double arrows icon next to the plugin name to activate the missing chains. Then mute the Main Output so only individual track outputs produce sound.",
                },
              },
              {
                "@type": "Question",
                name: "How do I drag samples from the Bank to my DAW?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text:
                    "In the Bank, hold Ctrl + Click on a sample to drag it directly into your DAW timeline. You can also drag samples from the Bank onto a track inside " +
                    pluginName +
                    " itself.",
                },
              },
            ],
          },
        ];

        var el = document.getElementById("json-ld-placeholder");
        if (el) el.textContent = JSON.stringify(jsonLd, null, 2);
      })();
    </script>
  </head>

  <body>

        <a

        </a>
        <a

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
